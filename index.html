<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Albums</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="topbar" aria-label="Primary">
        <div class="topbar-title">
          <p class="eyebrow">Memory binder</p>
          <h1 id="navTitle">Albums</h1>
        </div>
        <div class="topbar-actions">
          <span id="navCount" class="count-chip">0 albums</span>
          <button id="createAlbumBtn" class="primary-btn" type="button">Create new album</button>
        </div>
      </nav>

      <main class="app-main">
        <div id="viewRoot" class="view-root" aria-live="polite"></div>
      </main>
    </div>

    <dialog id="albumDialog" class="modal">
      <form method="dialog" id="albumForm" class="modal-card">
        <h2>Create a new album</h2>
        <p>Give this collection a title and a short note.</p>
        <label>
          Album title
          <input id="albumNameInput" name="albumName" type="text" maxlength="60" placeholder="Spring on the porch" required />
        </label>
        <label>
          Album description
          <textarea id="albumDescriptionInput" name="albumDescription" rows="3" maxlength="140" placeholder="Pressed flowers, warm tea, and little afternoon moments."></textarea>
        </label>
        <div class="modal-actions">
          <button class="secondary-btn" type="button" id="cancelAlbumBtn">Cancel</button>
          <button class="primary-btn" type="submit">Save album</button>
        </div>
      </form>
    </dialog>

    <dialog id="memoryDialog" class="modal">
      <form method="dialog" id="memoryForm" class="modal-card">
        <h2>Add a memory card</h2>
        <p>Upload a photo, add a title, and keep a short note beside it.</p>
        <label>
          Memory title
          <input id="memoryTitleInput" name="memoryTitle" type="text" maxlength="60" placeholder="Wildflower walk" required />
        </label>
        <label>
          Caption
          <textarea id="memoryCaptionInput" name="memoryCaption" rows="3" maxlength="180" placeholder="The afternoon smelled like cedar and sun-warmed paper."></textarea>
        </label>
        <label>
          Photo
          <input id="memoryImageInput" name="memoryImage" type="file" accept="image/*" required />
        </label>
        <div class="modal-actions">
          <button class="secondary-btn" type="button" id="cancelMemoryBtn">Cancel</button>
          <button class="primary-btn" type="submit">Save memory</button>
        </div>
      </form>
    </dialog>

    <template id="memoryCardTemplate">
      <article class="memory-card">
        <div class="memory-photo-shell">
          <img class="memory-photo" alt="Uploaded memory" />
        </div>
        <div class="memory-copy">
          <div class="memory-copy-top">
            <h3 class="memory-title"></h3>
            <button class="icon-btn delete-memory-btn" type="button" aria-label="Delete memory">×</button>
          </div>
          <p class="memory-caption"></p>
          <div class="memory-footer">
            <span class="memory-stamp"></span>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
